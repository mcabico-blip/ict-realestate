name: Build Mobile APK

# Runs on every push to master that touches the mobile/ directory.
# GitHub Actions has the Android SDK pre-installed on ubuntu-latest, so the
# APK builds in ~5 minutes and is attached to the workflow run as an artifact.
#
# After a successful run, download the APK at:
#   https://github.com/mcabico-blip/ict-realestate/actions
# → click the latest "Build Mobile APK" run → scroll to "Artifacts" →
# download "app-release.apk" → sideload onto your Android phone.

on:
  push:
    branches: [master]
    paths:
      - "mobile/**"
      - ".github/workflows/build-mobile-apk.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.32.1"

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK with commit SHA
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/ict-realtors-${GITHUB_SHA:0:7}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ict-realtors-apk
          path: mobile/artifacts/*.apk
          retention-days: 90

      - name: Output download instructions
        run: |
          echo "::notice::APK built. Download from the 'Artifacts' section of this workflow run."
